# Porta do Servidor
server.port=9090

# 1. Configuração do MySQL
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/petclinic?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=petuser
spring.datasource.password=petpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Inicialização de Dados (Ajustado para evitar erros de sintaxe)
# Ativa a inicialização sempre que o sistema subir
spring.sql.init.mode=always

# Aponta APENAS para o arquivo de dados do MySQL
spring.sql.init.data-locations=classpath:db/mysql/data.sql

# DEIXE VAZIO: Isso impede que o Spring tente rodar o schema.sql do H2 no MySQL
spring.sql.init.schema-locations=

# 3. JPA / Hibernate
# Deixamos em 'update' para o Hibernate criar as tabelas se não existirem
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Correção da estratégia de nomes para o Hibernate 6
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
